<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Reserva | Taller VORA</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .checkout-container {
            max-width: 600px;
            margin: 80px auto;
            text-align: center;
            padding: 40px;
            background: linear-gradient(to bottom, #0a0a0a 0%, #000000 100%);
            border: 1px solid #1a1a1a;
            border-radius: 20px;
        }
        .price-tag {
            font-size: 3rem;
            color: #00FF88;
            font-weight: 800;
            margin: 20px 0;
        }
        .btn-mercado-pago {
            background-color: #009EE3; /* Azul Mercado Pago */
            color: white;
            padding: 18px 40px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            display: inline-block;
            margin-top: 25px;
            transition: transform 0.2s;
        }
        .btn-mercado-pago:hover { transform: scale(1.05); }
    </style>
</head>
<body class="bg-black">
    <div class="checkout-container">
        <span class="label-orange">RESERVA REGISTRADA</span>
        <h1 class="text-white">ASEGURA TU ESPACIO</h1>
        <p class="text-gray">Para finalizar el proceso y confirmar los equipos para tu reunión, realiza el abono de la fianza técnica.</p>
        
        <div class="price-tag">$50.000</div>
        <p class="text-small">Abonables al valor total de tu paquete.</p>

        <a href="TU_LINK_DE_MERCADO_PAGO" class="btn-mercado-pago">PAGAR CON PSE O TARJETA</a>

        <div style="margin-top: 30px;">
            <img src="https://logotipous.com/wp-content/uploads/2021/11/mercado-pago-logo.png" width="120" alt="Mercado Pago Seguro">
        </div>
    </div>
</body>
</html>
