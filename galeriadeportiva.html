<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Deportiva | Taller VORA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=4.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body {
            background-color: #000;
        }
        .gallery-section {
            padding: 140px 20px 80px; /* Espacio para compensar el navbar fijo */
        }
        .section-title {
            color: #4cd78f;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 60px;
            text-align: center;
        }
    </style>
</head>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ZC6ST3XYFZ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-ZC6ST3XYFZ');
</script>

<body>

    <!-- HEADER -->
    <nav class="navbar">
        <a href="index.html">
            <img src="assets/logo-header-vora.png" alt="VORA Fotografía Deportiva" class="logo-img">
        </a>
        <a href="blog.html" class="nav-blog-link">blog</a>
    </nav>

    <!-- GALERÍA -->
    <section class="gallery-section">
        <h2 class="section-title">Muestra de Élite</h2>
        
        <div class="bento-grid" id="gallery">
            <div class="gallery-item large" onclick="openLightbox(this)">
                <img src="assets/imagen portada.png" alt="Comparativa Vora Pro 1">
                <div class="overlay"><i class="expand-icon">+</i></div>
            </div>

            <div class="gallery-item tall" onclick="openLightbox(this)">
                <img src="assets/foto mala.png" alt="Comparativa Vora Mala 1">
                <div class="overlay"><i class="expand-icon">+</i></div>
            </div>

            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="assets/imagen portada.png" alt="Comparativa Vora Pro 2">
                <div class="overlay"><i class="expand-icon">+</i></div>
            </div>

            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="assets/foto mala.png" alt="Comparativa Vora Mala 2">
                <div class="overlay"><i class="expand-icon">+</i></div>
            </div>

            <div class="gallery-item wide" onclick="openLightbox(this)">
                <img src="assets/imagen portada.png" alt="Comparativa Vora Pro 3">
                <div class="overlay"><i class="expand-icon">+</i></div>
            </div>
        </div>
    </section>

    <!-- LIGHTBOX STRUCTURE -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <span class="close-btn" onclick="closeLightbox(event)">&times;</span>
        <img id="lightbox-img" src="" alt="Full View" onclick="event.stopPropagation()">
        <div class="nav-container" onclick="event.stopPropagation()">
            <span class="nav-arrow prev" onclick="prevImage(event)">&#10094;</span>
            <div class="dots-window">
                <div id="dots-inner" class="dots-inner"></div>
            </div>
            <span class="nav-arrow next" onclick="nextImage(event)">&#10095;</span>
        </div>
    </div>

    <!-- FOOTER -->
<footer class="main-footer">
    <div class="footer-container">
        <div class="footer-logo-container">
            <img src="assets/logo-header-vora.png" alt="Taller VORA Logo" class="footer-logo-img">
            
        </div>

        <nav class="footer-nav">
            <div class="footer-column">
                <h4>CONTACTO</h4>
                <a href="https://wa.me/573239135052" target="_blank">WhatsApp</a>
                <a href="mailto:contacto@tallervora.com">Email</a>
            </div>
            <div class="footer-column">
                <h4>SOCIAL</h4>
                <a href="https://www.instagram.com/tallervora/" target="_blank">Instagram</a>
                <a href="https://www.facebook.com/profile.php?id=61589345946335&sk=about">Facebook</a>
            </div>
            <div class="footer-column">
                <h4>LEGAL</h4>
                <a href="#">Privacidad</a>
                <a href="#">Términos</a>
            </div>
        </nav>

        <div class="footer-bottom">
            <p>© 2026 Taller Vora. Fotografía de Autor. Bogotá, Colombia.</p>
        </div>
    </div>
</footer>

    <script src="script.js"></script>
</body>
</html>
