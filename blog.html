<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal | Taller VORA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://sibforms.com/forms/end-form/build/sib-styles.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            @font-face {
                font-display: block;
                font-family: Roboto;
                src: url(https://assets.brevo.com/font/Roboto/Latin/normal/normal/7529907e9eaf8ebb5220c5f9850e3811.woff2) format("woff2"), url(https://assets.brevo.com/font/Roboto/Latin/normal/normal/25c678feafdc175a70922a116c9be3e7.woff) format("woff")
            }

            @font-face {
                font-display: fallback;
                font-family: Roboto;
                font-weight: 600;
                src: url(https://assets.brevo.com/font/Roboto/Latin/medium/normal/6e9caeeafb1f3491be3e32744bc30440.woff2) format("woff2"), url(https://assets.brevo.com/font/Roboto/Latin/medium/normal/71501f0d8d5aa95960f6475d5487d4c2.woff) format("woff")
            }

            @font-face {
                font-display: fallback;
                font-family: Roboto;
                font-weight: 700;
                src: url(https://assets.brevo.com/font/Roboto/Latin/bold/normal/3ef7cf158f310cf752d5ad08cd0e7e60.woff2) format("woff2"), url(https://assets.brevo.com/font/Roboto/Latin/bold/normal/ece3a1d82f18b60bcce0211725c476aa.woff) format("woff")
            }
            --bone-white: #fdfdfd;
            --gray-dark: #333333;
            --gray-light: #f4f4f4;
            --neon-green: #4cd78f;
            --text-muted: #666;
        }

        body {
            background-color: var(--bone-white);
            color: var(--gray-dark);
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
        }

        /* --- HEADER --- */
        header {
            padding: 40px 5%;
            text-align: center;
            border-bottom: 1px solid var(--gray-light);
        }

        .logo-vora {
            height: 60px;
         
            transition: opacity 0.3s;
        }

        .logo-vora:hover { opacity: 0.7; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* --- SECCIÓN DESTACADA --- */
        .featured-article {
            padding: 80px 0;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 50px;
            align-items: center;
        }

        .featured-img-container {
            overflow: hidden;
            border-radius: 4px;
            aspect-ratio: 16/9;
        }

        .featured-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .featured-article:hover .featured-img-container img {
            transform: scale(1.03);
        }

        .category-tag {
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-green);
            margin-bottom: 15px;
            display: block;
        }

        .featured-content h1 {
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1.1;
            margin: 0 0 20px 0;
            font-weight: 900;
            text-transform: uppercase;
        }

        .featured-content p {
            font-family: Georgia, serif;
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .btn-read {
            text-decoration: none;
            color: #000;
            font-weight: 700;
            border-bottom: 2px solid #000;
            padding-bottom: 5px;
            transition: all 0.3s;
        }

        .btn-read:hover { color: var(--neon-green); border-color: var(--neon-green); }

        @media (max-width: 900px) {
            .featured-article { grid-template-columns: 1fr; padding: 40px 0; }
        }

        /* --- CTA BANNER (FOOTER) --- */
        .cta-banner {
            background-color: #000;
            color: #fff;
            padding: 100px 20px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        .footer-samples {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .footer-samples img {
            width: 280px;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #333;
            transition: all 0.3s ease;
        }

        .footer-samples img:hover {
            transform: translateY(-5px);
            border-color: var(--neon-green);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .btn-portafolio {
            background-color: var(--neon-green);
            color: #000;
            padding: 20px 40px;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .btn-portafolio:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(76, 215, 143, 0.4);
            background-color: #59ffaa;
        }

        /* --- SECCIÓN ARTÍCULOS RECIENTES (INFERIOR) --- */
        .recent-articles-bottom {
            margin-top: 80px;
            border-top: 1px solid var(--gray-light);
            padding-top: 60px;
            padding-bottom: 100px;
        }

        .recent-articles-bottom h3 {
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-bottom: 35px;
            color: var(--neon-green);
            font-weight: 900;
            border-bottom: 2px solid var(--neon-green);
            display: inline-block;
            padding-bottom: 5px;
        }

        #lista-recientes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
        }

        .sidebar-item a {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .sidebar-item img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 15px;
            display: block;
            background-color: var(--gray-light);
        }

        .sidebar-item h4 {
            font-size: 0.85rem;
            font-weight: 900;
            text-transform: uppercase;
            margin: 0 0 10px 0;
            line-height: 1.2;
            transition: color 0.3s;
        }

        .sidebar-item a:hover h4 { color: var(--neon-green); }

        .sidebar-item p {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin: 0;
        }

        /* --- POPUP SUBSCRIPCIÓN (ESTILO VORA) --- */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .popup-content {
            background-color: var(--bone-white);
            border: 3px solid #000;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            position: relative;
            box-shadow: 12px 12px 0px #000;
            text-align: center;
        }

        .popup-close {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 30px;
            font-weight: 900;
            cursor: pointer;
            color: #000;
        }

        .popup-content h2 {
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.5rem;
            margin-top: 10px;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .popup-content p {
            color: var(--text-muted);
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .popup-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .popup-input {
            padding: 15px;
            border: 3px solid #000;
            border-radius: 0;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            outline: none;
        }

        .btn-submit-popup {
            background-color: #28a745;
            color: #fff;
            padding: 15px;
            border: 3px solid #000;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-submit-popup:hover {
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0px #000;
        }

        .popup-feedback {
            margin-top: 20px;
            font-weight: 700;
            color: #28a745;
            display: none;
        }

        @media (max-width: 480px) {
            .popup-content { padding: 30px 20px; }
        }

        /* SECCIÓN COMENTARIOS CUSDIS */
        .comentarios-container {
            margin-top: 80px;
            padding-top: 40px;
            border-top: 3px solid #000;
            overflow: visible; /* Elimina el scroll propio */
            width: 100%;
        }
        #cusdis_thread {
            min-height: 200px;
            overflow: visible !important;
        }
        #cusdis_thread iframe {
            width: 100% !important;
            min-width: 100% !important;
            border: none !important;
            overflow: hidden !important;
        }
    </style>
</head>
<body>

    <header>
        <a href="blog.html"><img src="assets/logo blog.png" alt="VORA" class="logo-vora"></a>
    </header>

    <main class="container">
        <!-- ARTÍCULO DESTACADO -->
        <section class="featured-article" id="featured-article">
            <div class="featured-img-container" id="featured-image-container">
                <!-- Imagen dinámica -->
            </div>
            <div class="featured-content">
                <span class="category-tag">Lo más reciente</span>
                <h1 id="featured-title">Cargando...</h1>
                <p id="featured-excerpt">Buscando el contenido más reciente...</p>
                <a href="#" class="btn-read" id="featured-link">LEER ARTÍCULO</a>
            </div>
        </section>

   

        <!-- SECCIÓN DE ARTÍCULOS RECIENTES (AUTO-DETECTADOS) -->
        <section class="recent-articles-bottom">
            <h3>Artículos Recientes</h3>
            <div id="lista-recientes"></div>
        </section>

    </main>

    <!-- POPUP DE SUSCRIPCIÓN -->
    <div id="blog-popup-overlay" class="popup-overlay">
        <div class="popup-content">
            <span class="popup-close" id="close-popup-btn">&times;</span>
            <h2>Historias que impulsan el talento</h2>
            <p>Recibe reflexiones y consejos prácticos para vivir el deporte con propósito en tu correo.</p>
            <form id="sib-form" class="popup-form" method="POST" action="https://3bd7e61d.sibforms.com/serve/MUIFAHD21TxO9nQ45-reOHZytFn6D5NibvJtZeOv4lp87RFHmgJQF-QI9-udZJL3jF8mjhamlOPWUYNDFj_tVp0v3bvfFzOr2tEaqmMSTat66aYrEteam2V0pmpISDe_xIFTjf3mzgGAqrKSUrloZfOZdIUXVeM4AB86PaGhA6a-Qxfi3xxX5cHueIb9T6lAIydZIKwk9j-UiX1UNw==">
                <div class="sib-input">
                    <input class="popup-input" type="text" id="EMAIL" name="EMAIL" autocomplete="off" placeholder="Tu mejor email..." data-required="true" required />
                </div>
                <button class="sib-form-block__button sib-form-block__button-with-loader btn-submit-popup" form="sib-form" type="submit">
                    <svg class="icon clickable__icon progress-indicator__icon sib-hide-loader-icon" viewBox="0 0 512 512" style="width: 20px; height: 20px; margin-right: 10px; vertical-align: middle; fill: currentColor;">
                        <path d="M460.116 373.846l-20.823-12.022c-5.541-3.199-7.54-10.159-4.663-15.874 30.137-59.886 28.343-131.652-5.386-189.946-33.641-58.394-94.896-95.833-161.827-99.676C261.028 55.961 256 50.751 256 44.352V20.309c0-6.904 5.808-12.337 12.703-11.982 83.556 4.306 160.163 50.864 202.11 123.677 42.063 72.696 44.079 162.316 6.031 236.832-3.14 6.148-10.75 8.461-16.728 5.01z" />
                    </svg>
                    UNIRME AHORA
                </button>
                <input type="text" name="email_address_check" value="" class="input--hidden" style="display:none !important">
                <input type="hidden" name="locale" value="es">
                <input type="hidden" name="html_type" value="simple">
            </form>
            <div id="popup-success-msg" class="popup-feedback"><strong>¡Gracias por suscribirte! Revisa tu correo pronto.</strong></div>
        </div>
    </div>

 

    <script>
        async function detectarArticulos() {
            const lista = document.getElementById('lista-recientes');
            const foundArticles = [];
            const currentPath = window.location.pathname.split('/').pop() || 'blog.html';
            
            for (let i = 1; i <= 100; i++) {
                const num = i.toString().padStart(3, '0');
                const url = `Blog/articulo${num}.html`;
                
                try {
                    const response = await fetch(url);
                    if (!response.ok) break; 

                    if (url === currentPath) continue;

                    const html = await response.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    
                    const title = doc.querySelector('h1')?.textContent || `Volumen ${num}`;
                    const imgSrc = doc.querySelector('.article-container img')?.getAttribute('src') || doc.querySelector('img:not(.logo-vora)')?.getAttribute('src');
                    const excerpt = doc.querySelector('.article-container p')?.textContent || "";

                    foundArticles.push({ url, title, imgSrc, excerpt });
                } catch (e) { break; }
            }

            const sortedArticles = foundArticles.reverse();

            // Configurar Artículo Destacado (el más reciente de la lista)
            if (sortedArticles.length > 0) {
                const latest = sortedArticles[0];
                document.getElementById('featured-title').textContent = latest.title;
                document.getElementById('featured-excerpt').textContent = latest.excerpt.substring(0, 180) + "...";
                document.getElementById('featured-link').href = latest.url;
                if (latest.imgSrc) {
                    document.getElementById('featured-image-container').innerHTML = `<img src="${latest.imgSrc}" alt="${latest.title}">`;
                }
            }

            // Listar los artículos restantes en la sección inferior (del 2do al 6to)
            sortedArticles.slice(1, 6).forEach(art => {
                const item = document.createElement('div');
                item.className = 'sidebar-item';
                item.innerHTML = `
                    <a href="${art.url}">
                        ${art.imgSrc ? `<img src="${art.imgSrc}" alt="${art.title}">` : ''}
                        <h4>${art.title}</h4>
                    </a>
                    <p>${art.excerpt.substring(0, 90)}...</p>
                `;
                lista.appendChild(item);
            });
        }
        detectarArticulos();

        // --- LÓGICA DEL POPUP Y BREVO ---
       const POPUP_ID = 'vora_blog_popup_closed';

        function setPopupExpiration() {
            localStorage.setItem(POPUP_ID, new Date().getTime());
        }

        function shouldShowPopup() {
            const lastShown = localStorage.getItem(POPUP_ID);
            if (!lastShown) return true;
            const thirtyDays = 30 * 24 * 60 * 60 * 1000;
            return (new Date().getTime() - lastShown) > thirtyDays;
        }

        const overlay = document.getElementById('blog-popup-overlay');
        const closeBtn = document.getElementById('close-popup-btn');
        const subForm = document.getElementById('sib-form');

        // Mostrar tras 3 segundos
        if (shouldShowPopup()) {
            setTimeout(() => {
                overlay.style.display = 'flex';
            }, 3000);
        }

        closeBtn.onclick = () => {
            overlay.style.display = 'none';
            setPopupExpiration();
        };
        
        // Envío del formulario mediante Fetch para evitar recarga de página
        subForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(subForm);
            const actionUrl = subForm.getAttribute('action');

            try {
                await fetch(actionUrl, {
                    method: 'POST',
                    body: formData,
                    mode: 'no-cors' // Necesario para peticiones externas opacas
                });

                // Éxito: Ocultar formulario y mostrar mensaje de agradecimiento
                subForm.style.display = 'none';
                document.getElementById('popup-success-msg').style.display = 'block';
                setPopupExpiration();
            } catch (error) {
                console.error('Error al suscribirse:', error);
            }
        });
    </script>

    <!-- SCRIPTS DE VALIDACIÓN DE BREVO -->
    <script>
        window.REQUIRED_CODE = "Por favor, complete este campo.";
        window.INVALID_EMAIL_CODE = "El correo electrónico es inválido.";
    </script>
    <script src="https://sibforms.com/forms/end-form/build/main.js"></script>
</body>
</html>
